# One-time Job that runs ON the node's network (hostNetwork: true)
# to fetch an ECR token using the node's IAM role and create the
# registry-credentials secret for k8s-mapper.
#
# Usage: kubectl apply -f deploy/ecr-secret-job.yaml
# Cleanup: kubectl delete -f deploy/ecr-secret-job.yaml
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ecr-secret-creator
  namespace: o3-security
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ecr-secret-creator
  namespace: o3-security
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create", "update", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ecr-secret-creator
  namespace: o3-security
subjects:
  - kind: ServiceAccount
    name: ecr-secret-creator
    namespace: o3-security
roleRef:
  kind: Role
  name: ecr-secret-creator
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: batch/v1
kind: Job
metadata:
  name: create-ecr-secret
  namespace: o3-security
spec:
  ttlSecondsAfterFinished: 300
  template:
    spec:
      hostNetwork: true          # Use node's network → 1 hop to IMDS ✅
      serviceAccountName: ecr-secret-creator
      restartPolicy: Never
      containers:
        - name: ecr-login
          image: amazon/aws-cli:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              REGION="ap-south-1"
              REGISTRY="471112898140.dkr.ecr.${REGION}.amazonaws.com"

              echo "Fetching ECR token from node IAM role..."
              TOKEN=$(aws ecr get-login-password --region ${REGION})
              echo "Got ECR token ✅"

              # Install kubectl
              curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              chmod +x kubectl

              # Create or update the docker-registry secret
              ./kubectl create secret docker-registry registry-credentials \
                --docker-server=${REGISTRY} \
                --docker-username=AWS \
                --docker-password="${TOKEN}" \
                -n o3-security \
                --dry-run=client -o yaml | ./kubectl apply -f -

              echo "Secret registry-credentials created/updated ✅"
