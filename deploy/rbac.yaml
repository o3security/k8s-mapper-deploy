# ServiceAccount for k8s-mapper
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-mapper
  namespace: o3-security
  labels:
    app.kubernetes.io/name: k8s-mapper
    app.kubernetes.io/component: resource-mapper
---
# ClusterRole — READ-ONLY access to supply chain + reachability resources.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-mapper
  labels:
    app.kubernetes.io/name: k8s-mapper
    app.kubernetes.io/component: resource-mapper
rules:
  - apiGroups: [""]
    resources: ["namespaces", "pods", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch"]
---
# ClusterRoleBinding — grants cross-namespace read access
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-mapper
  labels:
    app.kubernetes.io/name: k8s-mapper
    app.kubernetes.io/component: resource-mapper
subjects:
  - kind: ServiceAccount
    name: k8s-mapper
    namespace: o3-security
roleRef:
  kind: ClusterRole
  name: k8s-mapper
  apiGroup: rbac.authorization.k8s.io
---
# Role — namespace-scoped read access to ONLY the 'registry-credentials' secret.
# This is the ONLY secret k8s-mapper reads — no broad secrets access.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: k8s-mapper-registry-secret
  namespace: o3-security
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["registry-credentials"]  # Only this specific secret
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: k8s-mapper-registry-secret
  namespace: o3-security
subjects:
  - kind: ServiceAccount
    name: k8s-mapper
    namespace: o3-security
roleRef:
  kind: Role
  name: k8s-mapper-registry-secret
  apiGroup: rbac.authorization.k8s.io
